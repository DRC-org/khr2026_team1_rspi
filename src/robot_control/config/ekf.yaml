ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # x, y, z
    # roll, pitch, yaw
    # vx, vy, vz
    # vroll, vpitch, vyaw
    # ax, ay, az

    odom0: /odom
    odom0_config: [
        true, # x
        true, # y
        false, # z
        false, # roll
        false, # pitch
        false, # yaw (Remove to trust IMU purely)
        true, # vx
        true, # vy
        false, # vz
        false, # vroll
        false, # vpitch
        false, # vyaw (Remove to trust IMU purely)
        false, # ax
        false, # ay
        false, # az
      ]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false

    imu0: /imu
    imu0_config:
      [
        false,
        false,
        false,
        true,
        true,
        true,
        false,
        false,
        false,
        true,
        true,
        true,
        true,
        true,
        true,
      ]
    imu0_queue_size: 10
    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true
