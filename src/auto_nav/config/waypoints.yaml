# ウェイポイント定義（絶対座標、フィールド座標系）
# 原点: フィールド南西端の外壁外側。x=東、y=北
# theta: ロボットの向き [rad]（0.0=東、π/2=北、π=西、-π/2=南）
# on_arrive: 到着後に実行するアクション

auto_sequence:
- waypoint_1
- waypoint_2
- waypoint_3

waypoints:
  waypoint_1:
    x: 1.006
    y: 1.810
    theta: -1.5707
    on_arrive: []
  waypoint_2:
    x: -2.481
    y: 6.45
    theta: 0.0
    on_arrive: []
  waypoint_3:
    x: 2.419
    y: 0.5
    theta: 0.0
    on_arrive: []
