# ウェイポイント定義（絶対座標、フィールド座標系）
# 原点: フィールド南西端の外壁外側。x=東、y=北
# theta: ロボットの向き [rad]（0.0=東、π/2=北、π=西、-π/2=南）
# on_arrive: 到着後に実行するアクション

auto_sequence:
- yagura_pickup_1
- ring_pickup_1
- yagura_release_1
- yagura_release_2
- ring_pickup_2
- yagura_pickup_1_via
- yagura_pickup_2
- yagura_release_3
- honmaru

waypoints:
  home:
    x: 3.143
    y: 0.288
    theta: -1.5707
    on_arrive: []

  yagura_pickup_1:
    x: 1.404
    y: 0.35
    theta: -1.5707
    preconditions:
      - target: "yagura_1"
        control_type: "pos"
        expected: "up_done"
        correct_action: "up"
        correct_wait: "up_done"
        timeout: 10.0
      - target: "yagura_1"
        control_type: "state"
        expected: "open_done"
        correct_action: "open"
        correct_wait: "open_done"
        timeout: 10.0
      - target: "yagura_2"
        control_type: "pos"
        expected: "up_done"
        correct_action: "up"
        correct_wait: "up_done"
        timeout: 10.0
      - target: "yagura_2"
        control_type: "state"
        expected: "open_done"
        correct_action: "open"
        correct_wait: "open_done"
        timeout: 10.0
    pre_arrive:
      - action: hand_control
        target: "yagura_1"
        control_type: "pos"
        action_value: "down"
      - action: hand_control
        target: "yagura_2"
        control_type: "pos"
        action_value: "down"
    on_arrive:
      - action: wait_actuator
        target: "yagura_1"
        control_type: "pos"
        value: "down_done"
        timeout: 10.0
      - action: wait_actuator
        target: "yagura_2"
        control_type: "pos"
        value: "down_done"
        timeout: 10.0
      - action: hand_control
        target: "yagura_1"
        control_type: "state"
        action_value: "close"
      - action: hand_control
        target: "yagura_2"
        control_type: "state"
        action_value: "close"
      - action: wait_actuator
        target: "yagura_1"
        control_type: "state"
        value: "close_done"
        timeout: 10.0
      - action: wait_actuator
        target: "yagura_2"
        control_type: "state"
        value: "close_done"
        timeout: 10.0
      - action: hand_control
        target: "yagura_1"
        control_type: "pos"
        action_value: "up"
      - action: hand_control
        target: "yagura_2"
        control_type: "pos"
        action_value: "up"
      - action: wait_actuator
        target: "yagura_1"
        control_type: "pos"
        value: "up_done"
        timeout: 10.0
      - action: wait_actuator
