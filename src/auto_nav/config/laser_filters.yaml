# LiDAR スキャンフィルタ設定
#
# フィルタチェーン:
#   filter1: SpeckleFilter — LiDAR 傾きによる孤立ノイズ点を除去
#   filter2: StaticLaserScanPolygonFilter — ロボット本体（タイヤ）の映り込みを除去
#
# SpeckleFilter:
#   LiDAR が若干傾いて設置されているため、地面反射による孤立点が発生し
#   コストマップが偽障害物を認識する問題を防ぐ。
#   隣接スキャン点との距離差で孤立点を判定（max_range_difference=0.10m, window=3）。
#   実障害物（壁・柱）は連続した点群のため影響しない。
#
# StaticLaserScanPolygonFilter:
#   base_link 座標系でロボット矩形内の点を除去。
#   Nav2 フットプリント [[0.25, 0.29], ...] + padding 0.03m でタイヤ映り込みをカバー。
#   起動時1回のみ TF 取得のため安定動作する。
#
# 前提: base_link → laser_frame の静的 TF が配信されていること（auto_nav_launch.py で設定済み）

scan_to_scan_filter_chain:
  ros__parameters:
    filter1:
      name: speckle_filter
      type: laser_filters/LaserScanSpeckleFilter
      params:
        filter_type: 0
        max_range: 0.0
        max_range_difference: 0.10
        filter_window: 3
    filter2:
      name: footprint_filter
      type: laser_filters/StaticLaserScanPolygonFilter
      params:
        polygon: "[[0.20, 0.24], [-0.20, 0.24], [-0.20, -0.24], [0.20, -0.24]]"
        polygon_frame: "base_link"
        invert: false
        polygon_padding: 0.03
        transform_timeout: 10.0
