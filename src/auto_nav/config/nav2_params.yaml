# Nav2 ナビゲーションスタック設定
#
# 対象ロボット: 4輪メカナムホイール（M3508）+ YDLiDAR
# ローカルプランナー: DWB（全方向移動に対応するため Y 方向速度を有効化）
# グローバルプランナー: NavfnPlanner（A*）
#
# ローカリゼーション: AMCL（合成 PGM マップ使用）
# map_server + amcl は lifecycle_manager_localization が管理

# =============================================================================
# lifecycle_manager_localization（map_server + amcl）
# =============================================================================
lifecycle_manager_localization:
  ros__parameters:
    autostart: true
    node_names:
      - map_server
      - amcl
    # RPi での遅延起動や負荷スパイクによる bond 切断を防ぐため延長
    bond_timeout: 30.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0

# =============================================================================
# lifecycle_manager（Nav2 ナビゲーションノード）
# =============================================================================
lifecycle_manager_navigation:
  ros__parameters:
    autostart: true
    node_names:
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
    bond_timeout: 20.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0

# =============================================================================
# controller_server（MPPI コントローラー、メカナム全方向移動対応）
# DWB は差動駆動前提の PathAlign/GoalAlign で旋回を強制するため、
# メカナムの横移動を活かせなかった。MPPI + motion_model:"Omni" で
# 横移動・斜め移動を自然に使って経路追従する。
# =============================================================================
controller_server:
  ros__parameters:
    controller_frequency: 5.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # 壁近傍スタートを考慮して判定距離を小さく・猶予時間を長めに設定
      required_movement_radius: 0.3
      movement_time_allowance: 30.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.02
      yaw_goal_tolerance: 0.40
      stateful: True

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      # ホライズン = time_steps * model_dt = 5 * 0.2 = 1.0s
      # 短いホライズンをbatch_size・iteration_countの増加で補う
      time_steps: 5
      model_dt: 0.2
      batch_size: 400
      vx_std: 0.5
      vy_std: 0.25
      wz_std: 0.2
      vx_max: 2.5
      vx_min: -2.5
      vy_max: 1.5
      vy_min: -1.5
      wz_max: 3.5
      motion_model: "Omni"
      iteration_count: 1
      prune_distance: 2.5
      transform_tolerance: 0.2
      temperature: 0.3
      gamma: 0.015
      # /optimal_trajectory (採用経路) と /trajectories (全サンプル) を配信。
      # RViz2 では /trajectories を非表示にして /optimal_trajectory のみ表示する
      visualize: true
      retry_attempt_limit: 1
      critics:
        - "ConstraintCritic"
        - "CostCritic"
        - "GoalCritic"
        - "GoalAngleCritic"
        - "PathAlignCritic"
        - "PathFollowCritic"
      ConstraintCritic.enabled: true
      ConstraintCritic.cost_power: 1
      ConstraintCritic.cost_weight: 4.0
      # CostCritic: コストマップの障害物コストを評価（壁回避）
      # critical_cost > 254(LETHAL) にすることで collision_cost は真の衝突のみに適用
      # → INSCRIBED/インフレーションゾーンを collision_cost で全部潰さない
      CostCritic.enabled: true
      CostCritic.cost_power: 1
      CostCritic.cost_weight: 3.81
      CostCritic.critical_cost: 300.0
      CostCritic.consider_footprint: false
      CostCritic.collision_cost: 1000000.0
      CostCritic.near_goal_distance: 1.0
      GoalCritic.enabled: true
      GoalCritic.cost_power: 1
      GoalCritic.cost_weight: 8.0
      GoalCritic.threshold_to_consider: 0.8
      GoalAngleCritic.enabled: true
      GoalAngleCritic.cost_power: 1
      GoalAngleCritic.cost_weight: 2.0
      GoalAngleCritic.threshold_to_consider: 0.5
      # PathAlignCritic: 横移動でパス上に乗る（use_path_orientations:false で向き強制しない）
      PathAlignCritic.enabled: true
      PathAlignCritic.cost_power: 1
      PathAlignCritic.cost_weight: 4.0
      PathAlignCritic.max_path_occupancy_ratio: 0.05
      PathAlignCritic.trajectory_point_step: 3
      PathAlignCritic.threshold_to_consider: 0.5
      PathAlignCritic.offset_from_furthest: 5
      PathAlignCritic.use_path_orientations: false
      PathFollowCritic.enabled: true
      PathFollowCritic.cost_power: 1
      PathFollowCritic.cost_weight: 8.0
      PathFollowCritic.offset_from_furthest: 5
      PathFollowCritic.threshold_to_consider: 0.5
      # PathAngleCritic: メカナムは向きと移動方向が独立するため不要（削除）
      # forward_preference:true がロボット後退を禁忌扱いし南向きロボットが詰まる原因だった

# =============================================================================
# planner_server（NavfnPlanner / A*）
# =============================================================================
planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.25
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      smooth_path: true
      cost_travel_multiplier: 2.0

# =============================================================================
# bt_navigator
# =============================================================================
bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 1000
    wait_for_service_timeout: 1000
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    # plugin_lib_names はカスタム BT プラグイン追加用（ビルトインは自動ロードされる）
    # 明示的に指定すると二重登録エラーになるため空のままにする
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

# =============================================================================
# behavior_server（ROS2 Jazzy での名称）
# エラー時は "recoveries_server" に戻すこと
# =============================================================================
behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

# =============================================================================
# global_costmap
# =============================================================================
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      # フットプリント実寸: 中心→前後 0.25m、中心→左右 0.29m
      footprint: "[[0.25, 0.29], [-0.25, 0.29], [-0.25, -0.29], [0.25, -0.29]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.5
        inflation_radius: 0.40
      always_send_full_costmap: true

# =============================================================================
# local_costmap（rolling window、3m×3m）
# =============================================================================
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      # フットプリント実寸: 中心→前後 0.25m、中心→左右 0.29m
      footprint: "[[0.25, 0.29], [-0.25, 0.29], [-0.25, -0.29], [0.25, -0.29]]"
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.5
        # フットプリント対角半径 0.38m に対し、レーザーフィルタの実効除去範囲
        # (±0.23m×±0.27m) を考慮して 0.30m に縮小。壁際ゴールへの到達性を確保。
        inflation_radius: 0.30
      always_send_full_costmap: true

# =============================================================================
# smoother_server（パス平滑化）
# =============================================================================
smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

# =============================================================================
# waypoint_follower
# =============================================================================
waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

# =============================================================================
# route_server（グラフベースルート計画）
# =============================================================================
route_server:
  ros__parameters:
    boundary_radius_to_achieve_node: 1.0
    radius_to_achieve_node: 2.0
    smooth_corners: true
    operations: ["AdjustSpeedLimit", "ReroutingService", "CollisionMonitor"]
    ReroutingService:
      plugin: "nav2_route::ReroutingService"
    AdjustSpeedLimit:
      plugin: "nav2_route::AdjustSpeedLimit"
    CollisionMonitor:
      plugin: "nav2_route::CollisionMonitor"
      max_collision_dist: 3.0
    edge_cost_functions: ["DistanceScorer", "CostmapScorer"]
    DistanceScorer:
      plugin: "nav2_route::DistanceScorer"
    CostmapScorer:
      plugin: "nav2_route::CostmapScorer"

# =============================================================================
# velocity_smoother（速度平滑化）
# メカナム対応: Y 方向速度を有効化
# =============================================================================
velocity_smoother:
  ros__parameters:
    smoothing_frequency: 10.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    # メカナム: [x, y, theta] の順。MPPI の速度制限と合わせる
    max_velocity: [2.5, 1.5, 3.5]
    min_velocity: [-1.0, -1.5, -3.5]
    max_accel: [4.0, 4.0, 4.5]
    max_decel: [-4.0, -4.0, -4.5]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# =============================================================================
# collision_monitor（近接障害物検知・速度ゼロ化）
# /scan_filtered と /local_costmap/published_footprint を使用
# =============================================================================
collision_monitor:
  ros__parameters:
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 0.8
      simulation_time_step: 0.1
      min_points: 6
      visualize: False
      enabled: True
    observation_sources: ["scan"]
    scan:
      type: "scan"
      # タイヤ映り込みを除去した /scan_filtered を使用
      topic: /scan_filtered
      min_height: 0.10
      max_height: 2.0
      enabled: True

# =============================================================================
# docking_server（競技では未使用だが navigation_launch.py が必須ノードとして管理）
# =============================================================================
docking_server:
  ros__parameters:
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "odom"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5
    dock_plugins: ["simple_charging_dock"]
    simple_charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true
      use_battery_status: false
      use_stall_detection: false
      external_detection_timeout: 1.0
      external_detection_translation_x: -0.18
      external_detection_translation_y: 0.0
      external_detection_rotation_roll: -1.57
      external_detection_rotation_pitch: -1.57
      external_detection_rotation_yaw: 0.0
      filter_coef: 0.1
