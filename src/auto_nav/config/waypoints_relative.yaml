# 壁基準ウェイポイント定義テンプレート（競技前に一度だけ編集する）
# generate_waypoints.py により絶対座標の waypoints.yaml に変換される。
#
# 方角の定義（マッピング時のロボット初期向きを基準とする）:
#   north: ロボット初期向きの先にある壁（+Y 方向の壁）
#   south: その反対の壁（-Y 方向の壁）
#   east:  ロボットの右側の壁（+X 方向の壁）
#   west:  ロボットの左側の壁（-X 方向の壁）
#
# 各フィールドの意味:
#   from_wall:      基準壁の方角（north / south / east / west）
#   distance:       その壁の内側面からフィールド内側への距離 [m]
#   cross_wall:     交差方向の基準壁（from_wall と直交する壁）
#   cross_distance: cross_wall からの距離 [m]
#   theta:          到着時のロボットの向き [rad]（0.0 = +X 方向）
#   on_arrive:      到着後に実行するアクション（Phase 9 実装後に有効）

auto_sequence:
  - waypoint_1
  - waypoint_2
  - waypoint_3

waypoints:
  waypoint_1:
    from_wall: south
    distance: 0.5
    cross_wall: west
    cross_distance: 1.0
    theta: 0.0
    on_arrive: []
  waypoint_2:
    from_wall: north
    distance: 0.5
    cross_wall: west
    cross_distance: 1.0
    theta: 0.0
    on_arrive: []
  waypoint_3:
    from_wall: south
    distance: 0.5
    cross_wall: east
    cross_distance: 1.0
    theta: 0.0
    on_arrive: []
