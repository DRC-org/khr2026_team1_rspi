# フィールド寸法定義（ルールブック記載値、単位: m）
# 競技前にルールブックを確認して値を修正すること
# 寸法は外寸方式（壁の外側面を基準とする）

field:
  width: 6.962           # X方向（東西）全幅（両コート合計、外寸）
  height: 7.0            # Y方向（南北）高さ（外寸）
  wall_thickness: 0.038  # 壁の厚み（PGM 描画用）

# PGM 原点（画像左下端のワールド座標）
# 原点 (0,0) = フィールド南西端（西側外周壁外側 × 南側外周壁外側の交点）
origin:
  x: -3.481           # = -width / 2
  y: 0.0              # フィールド南端（南側外周壁外側）が y=0

# PGM 解像度（m/cell）
resolution: 0.05

# コート別ロボット初期位置（ワールド座標）
# generate_field_map.py 実行後、実機で位置を確認して調整すること
# blue:  右（+X）コート、南スタート
# red:   左（-X）コート、南スタート（routing_node が X 反転して対応）
start_positions:
  blue:
    # 東壁内面(x=3.443) - 実寸半幅(0.29m) - マージン(0.01m) = 3.143m
    x: 3.143
    # 南壁内面(y=0.038) + 実寸前後半長(0.25m) = 0.288m（変更なし）
    y: 0.288
    yaw: -1.5708   # 南向き (-Y, -π/2 rad)
  red:
    x: -3.143      # 西壁内面(-x=3.443) と対称
    y: 0.288
    yaw: 1.5708    # 北向き (+Y, π/2 rad)

# フィールド内部の壁（線分 + 厚みで指定、ワールド座標・単位 m）
# x1,y1 → x2,y2 の線分を thickness の幅で描画する
internal_walls:
  - name: center_divider   # 青赤コート仕切り壁（x=0 の縦線、全高）
    x1: 0.0
    y1: 0.0    # 南外周壁外側から
    x2: 0.0
    y2: 7.0    # 北外周壁外側まで（field.height と同値）
    thickness: 0.038
  - name: yagura_1
    x1: 0.619
    y1: 2.829
    x2: -0.619
    y2: 2.829
    thickness: 0.038
  - name: yagura_2
    x1: 0.619
    y1: 3.867
    x2: -0.619
    y2: 3.867
    thickness: 0.038
  - name: yagura_3
    x1: 0.619
    y1: 4.905
    x2: -0.619
    y2: 4.905
    thickness: 0.038
  - name: yagura_4
    x1: 0.619
    y1: 5.943
    x2: -0.619
    y2: 5.943
    thickness: 0.038
  - name: area_1
    x1: 2.012
    y1: 1.810
    x2: 2.012
    y2: 6.962
    thickness: 0.038
  - name: area_2
    x1: -2.012
    y1: 1.810
    x2: -2.012
    y2: 6.962
    thickness: 0.038
  - name: honmaru
    x1: 0.297
    y1: 1.438
    x2: -0.297
    y2: 1.438
    thickness: 0.136
